name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    # Tambahkan dependensi sistem yang sering dibutuhkan untuk NDK
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build build-essential

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=0 --install "ndk;28.2.13676358"
        # Export NDK_HOME agar bisa diakses oleh shell manapun
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      # Menambahkan debug mode (set -x) dan memastikan NDK_HOME terbaca
      run: |
        set -x
        export NDK_HOME=${{ env.NDK_HOME }}
        bash compile-hevtun.sh
    
    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        mkdir -p app/libs
        cp -r ${{ github.workspace }}/libs/* ${{ github.workspace }}/app/libs/ || echo "No libs found to copy"

    - name: Fetch AndroidLibXrayLite tag
      run: |
        CURRENT_TAG=$(curl -s https://api.github.com/repos/unarto/Androidlibxraylitev26.1.23/releases/latest | jq -r .tag_name)
        echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.12
      with:
        repository: 'unarto/Androidlibxraylitev26.1.23'
        tag: ${{ env.CURRENT_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: app/libs/

    - name: Decode debug keystore
      run: base64 -d debug.keystore.base64 > debug.keystore || echo "Skipping keystore."

    - name: Build APK
      run: |
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: release-apks
        path: app/build/outputs/apk/*/release/*.apk
