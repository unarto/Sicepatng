name: Build Bebas Merdeka

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=0 --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

    # --- SETUP GO UNTUK BUILD AAR ---
    - name: Setup Golang
      uses: actions/setup-go@v6.1.0
      with:
        go-version-file: 'Androidlibxraylitev26.1.23/go.mod'

    - name: Install & Setup Gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Setup Build Essentials
      run: sudo apt-get update && sudo apt-get install -y build-essential

    # --- BAGIAN OTOMATISASI JAR ---
    - name: Fix Gradle Wrapper (Otomatis tiap Build)
      run: |
        echo "--- Memastikan Gradle Wrapper selalu fresh ---"
        rm -rf gradle/wrapper/gradle-wrapper.jar
        gradle wrapper --gradle-version 9.3.1
    # ------------------------------

    # --- BAGIAN 1: CACHE & COMPILE LIBV2RAY (AAR) ---
    - name: Restore cached libv2ray
      id: cache-libv2ray-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/v2ray_aar_bin
        key: libv2ray-${{ runner.os }}-${{ hashFiles('Androidlibxraylitev26.1.23/go.mod') }}-${{ hashFiles('Androidlibxraylitev26.1.23/gen_assets.sh') }}

    - name: Build libv2ray.aar (Local Repo)
      if: steps.cache-libv2ray-restore.outputs.cache-hit != 'true'
      run: |
        gomobile init
        cd Androidlibxraylitev26.1.23
        mkdir -p assets data
        bash gen_assets.sh download
        cp -v data/*.dat assets/
        go mod tidy
        mkdir -p ../v2ray_aar_bin
        gomobile bind -v -androidapi 24 -trimpath -ldflags='-s -w -buildid=' -o ../v2ray_aar_bin/libv2ray.aar ./

    - name: Save libv2ray
      if: steps.cache-libv2ray-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/v2ray_aar_bin
        key: libv2ray-${{ runner.os }}-${{ hashFiles('Androidlibxraylitev26.1.23/go.mod') }}-${{ hashFiles('Androidlibxraylitev26.1.23/gen_assets.sh') }}

    - name: Copy libv2ray to App Folder
      run: |
        # Mencari folder modul utama secara otomatis dan membuat folder libs di dalamnya
        TARGET_DIR=$(find . -maxdepth 2 -name "build.gradle*" -not -path "./build.gradle*" | head -n 1 | xargs dirname)
        mkdir -p "$TARGET_DIR/libs/"
        cp ${{ github.workspace }}/v2ray_aar_bin/libv2ray.aar "$TARGET_DIR/libs/"
        echo "Libv2ray disalin ke: $TARGET_DIR/libs/"

    # --- BAGIAN 2: CACHE & COMPILE LIBHEVTUN ---
    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      env:
        NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
      run: |
        if [ ! -d "hev-socks5-tunnel" ]; then
          echo "Error: Folder hev-socks5-tunnel tidak ditemukan!"
          exit 1
        fi
        chmod +x compile-hevtun.sh
        bash compile-hevtun.sh

    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Sync Libs to App Folder
      run: |
        TARGET_DIR=$(find . -maxdepth 2 -name "build.gradle*" -not -path "./build.gradle*" | head -n 1 | xargs dirname)
        mkdir -p "$TARGET_DIR/libs"
        if [ -d "libs" ]; then
          cp -r libs/* "$TARGET_DIR/libs/"
        fi

    - name: Decode debug keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi

    # --- BAGIAN 3: BUILD APK (BYPASS LINT & AUTO SPLIT) ---

    - name: Build APK
      run: |
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v4
      if: ${{  success() }}
      with:
        name: arm64-v8a
        path: ${{ github.workspace }}/app/build/outputs/apk/*/release/*arm64-v8a*.apk

    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v4
      if: ${{  success() }}
      with:
        name: armeabi-v7a
        path: ${{ github.workspace }}/app/build/outputs/apk/*/release/*armeabi-v7a*.apk

    - name: Upload x86 APK
      uses: actions/upload-artifact@v4
      if: ${{  success() }}
      with:
        name: x86-apk
        path: ${{ github.workspace }}/app/build/outputs/apk/*/release/*x86*.apk

    - name: Upload to release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != ''
      with:
        file: ${{ github.workspace }}/app/build/outputs/apk/*/release/*.apk
        tag: ${{ github.event.inputs.release_tag }}
        file_glob: true
        prerelease: true

    # --- BAGIAN 5: AUTO RELEASE KE HALAMAN GITHUB RELEASES ---
    - name: Generate Release Tag
      run: |
        echo "FINAL_TAG=v3.0.${{ github.run_number }}" >> $GITHUB_ENV

    - name: Create GitHub Release & Upload All Split APKs
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.FINAL_TAG }}
        name: "Sicepat Bebas Merdeka Build #${{ github.run_number }}"
        body: |
          Rilis otomatis biner APK hasil compile via workflow Build Bebas Merdeka (Repo Sicepat).
          
          **Isi Rilis APK Berdasarkan Arsitektur:**
          - `arm64-v8a` (HP Modern 64-bit)
          - `armeabi-v7a` (HP Lama 32-bit)
          - `x86` / `x86_64` (Untuk Emulator / Device Intel)
        files: |
          **/build/outputs/apk/*/release/*.apk
