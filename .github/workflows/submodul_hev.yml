name: Pasang Submodule HevSocks5

on:
  workflow_dispatch: # Tombol klik manual di browser

permissions:
  contents: write # Biar bot bisa nge-push balik kodenya

jobs:
  inject-hev:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Identity Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Eksekusi Pasang Submodule Hev
        run: |
          # Bersihin sisa lama kalau pernah ada biar gak bentrok
          git rm -f hevsocks5tunnel || true
          rm -rf .git/modules/hevsocks5tunnel || true
          
          # Tembak langsung ke repo hev-socks5-tunnel milik lu
          git submodule add https://github.com/unarto/hev-socks5-tunnel hevsocks5tunnel
          
          # Push perubahan ke repo utama
          git add .
          git commit -m "🤖 Bot: Sukses pasang submodule hevsocks5tunnel secara otomatis"
          git push origin main
